name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so SourceLink/repository metadata is accurate

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BeeneticToolkit.sln

      - name: Build
        run: dotnet build BeeneticToolkit.sln -c Release --no-restore

      - name: Test
        run: dotnet test BeeneticToolkit.sln -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack BeeneticToolkit.sln -c Release --no-build -o artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: nupkg
          path: artifacts/*nupkg

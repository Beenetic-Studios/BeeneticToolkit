name: Release

# Publishes to nuget.org when a version tag (e.g. v0.1.0) is pushed, using NuGet
# Trusted Publishing (OIDC) - no long-lived API key secret. Requires:
#   * a Trusted Publishing policy on nuget.org (owner Beenetic-Studios, repo BeeneticToolkit, workflow release.yml)
#   * a repo secret NUGET_USER set to your nuget.org username (profile name, not email)
on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # request the GitHub OIDC token for NuGet Trusted Publishing
      contents: write  # allow creating the GitHub release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore BeeneticToolkit.sln

      - name: Build
        run: dotnet build BeeneticToolkit.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: dotnet test BeeneticToolkit.sln -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack BeeneticToolkit.sln -c Release --no-build -p:Version=${{ steps.version.outputs.value }} -o artifacts

      - name: Authenticate to nuget.org (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }} # your nuget.org username (profile name), stored as a repo secret

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*nupkg
          generate_release_notes: true
